<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plasma Relámpago - Versión Épica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 20; }
        .btn { width: 75px; height: 75px; background: rgba(0, 150, 255, 0.3); border: 2px solid #00d4ff; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; user-select: none; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div class="controls">
        <div style="display: flex; gap: 15px;"><div id="btnL" class="btn">◀</div><div id="btnR" class="btn">▶</div></div>
        <div style="display: flex; gap: 15px;"><div id="btnA" class="btn" style="border-color:red">ATK</div><div id="btnS" class="btn">▲</div></div>
    </div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth, height: window.innerHeight,
        physics: { default: 'arcade', arcade: { gravity: { y: 1200 } } },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let p, mov = { l: false, r: false }, hasJump = false;

    function preload() {
        // ENLACES DIRECTOS A ASSETS ÉPICOS (Para que no tengas que subir nada)
        this.load.image('fondo', 'https://play.phaser.io/assets/skies/space3.png');
        this.load.image('suelo', 'https://play.phaser.io/assets/sprites/platform.png');
        this.load.spritesheet('sabio', 'https://play.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });
        this.load.image('gema', 'https://play.phaser.io/assets/sprites/gem.png');
    }

    function create() {
        this.add.tileSprite(1500, config.height/2, 3000, config.height, 'fondo').setScrollFactor(0.2);
        let plats = this.physics.add.staticGroup();
        for(let i=0; i<10; i++) { plats.create(i*400, config.height-30, 'suelo').setScale(2).refreshBody(); }
        
        p = this.physics.add.sprite(100, config.height-100, 'sabio').setScale(1.5);
        p.setCollideWorldBounds(true);
        this.physics.add.collider(p, plats);

        this.anims.create({ key: 'camina', frames: this.anims.generateFrameNumbers('sabio', { start: 5, end: 8 }), frameRate: 10, repeat: -1 });
        this.anims.create({ key: 'parado', frames: [{ key: 'sabio', frame: 4 }], frameRate: 20 });

        this.cameras.main.setBounds(0, 0, 3000, config.height);
        this.cameras.main.startFollow(p);

        // CONTROLES
        const setB = (id, s, e) => {
            const el = document.getElementById(id);
            el.ontouchstart = (ev) => { ev.preventDefault(); s(); };
            el.ontouchend = (ev) => { ev.preventDefault(); if(e) e(); };
        };
        setB('btnL', () => { mov.l = true; p.flipX = true; }, () => mov.l = false);
        setB('btnR', () => { mov.r = true; p.flipX = false; }, () => mov.r = false);
        setB('btnS', () => { if(p.body.touching.down) p.setVelocityY(-600); });
        setB('btnA', () => { p.setTint(0xff0000); setTimeout(() => p.clearTint(), 200); });
    }

    function update() {
        if (mov.l) { p.setVelocityX(-200); p.play('camina', true); }
        else if (mov.r) { p.setVelocityX(200); p.play('camina', true); }
        else { p.setVelocityX(0); p.play('parado'); }
    }
</script>
</body>
</html>
